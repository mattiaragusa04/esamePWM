<div class="container py-5">
  <div class="card auth-card p-4 shadow-lg mx-auto" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-4">
      <h2 class="fw-bold mb-2">Reimposta Password</h2>
      <p class="text-muted">Scegli una nuova password sicura per il tuo account.</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="newPassword" class="form-label fw-semibold">Nuova Password</label>
        <input type="password" class="form-control" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required placeholder="Inserisci nuova password" />
        <div class="form-text mt-2 small">
          La password deve contenere almeno:
          <ul class="mb-0 ps-3">
            <li [ngClass]="{'text-success fw-bold': newPassword.length >= 8}">8 caratteri</li>
            <li [ngClass]="{'text-success fw-bold': /[A-Z]/.test(newPassword)}">1 lettera maiuscola</li>
            <li [ngClass]="{'text-success fw-bold': /[a-z]/.test(newPassword)}">1 lettera minuscola</li>
            <li [ngClass]="{'text-success fw-bold': /[0-9]/.test(newPassword)}">1 numero</li>
            <li [ngClass]="{'text-success fw-bold': /[!@#$%^&*(),.?\':{}|<>]/.test(newPassword)}">1 carattere speciale</li>
          </ul>
        </div>
      </div>

      <div class="mb-4">
        <label for="confirmPassword" class="form-label fw-semibold">Conferma Password</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="Ripeti la nuova password" />
        <div *ngIf="confirmPassword && newPassword !== confirmPassword" class="text-danger mt-1 small">
          Le password non coincidono.
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="isLoading || !isPasswordValid() || newPassword !== confirmPassword">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        {{ isLoading ? 'Salvataggio...' : 'Salva nuova password' }}
      </button>
    </form>
  </div>
</div>
