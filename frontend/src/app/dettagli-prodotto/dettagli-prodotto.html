<div class="card p-4">
    <p>dettagli-prodotto works!</p>
    <p>{{ prodotto?.nome }}</p>

    <p>{{ prodotto?.descrizione }}</p>
    <p>{{ prodotto?.prezzoUnitarioVendita | currency:'EUR':'symbol' }}</p>
    <img [src]="prodotto?.immagine.includes('http') ? prodotto.immagine : 'http://localhost:3000/' + prodotto.immagine" alt="{{ prodotto?.nome }}" style="max-width: 300px; max-height: 300px; object-fit: contain;">

    <button class="btn btn-info rounded-pill px-4 mt-3" (click)="aggiungiAlCarrello()">Aggiungi al Carrello</button>
</div>
