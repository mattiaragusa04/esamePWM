

<div class="container mt-3">

      </a>

        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Voci di menu principali -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mr-auto align-items-center">
          
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'console']" routerLinkActive="active">
              Console
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'videogiochi']" routerLinkActive="active">

              Accessori
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'elettronica']" routerLinkActive="active">
              Elettronica
            </a>
          </li> 
        </ul>

        <ul class="navbar-nav ml-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" [routerLink]="['/carrello']" routerLinkActive="active" title="Carrello">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-cart3" viewBox="0 0 16 16">

              </svg>
              <span class="ml-1">Carrello</span>
            </a>
          </li>
          <ng-container *ngIf="!utenteLoggato">
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center" [routerLink]="['/login']" routerLinkActive="active" title="Accedi">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">

                </svg>
                <span class="ml-1">Accedi</span>
              </a>
            </li>

          </ng-container>
          <li class="nav-item" #searchContainer>
            <div class="search-container-animated" [class.open]="mostraRicerca">
              <!-- Icona di ricerca visibile quando l'input è nascosto -->
              <a class="nav-link search-icon-btn" (click)="toggleRicerca($event)" style="cursor: pointer;" title="Cerca">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                  <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                </svg>
            <span class="ml-1">Cerca</span>
              </a>
              <!-- Barra di ricerca che appare al click -->
              <div class="input-group input-group-sm search-input-wrapper">
                <input #searchInput type="text" name="ricerca" class="form-control rounded-pill" style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;" placeholder="Cerca prodotti..." [(ngModel)]="termineRicerca" (keyup.enter)="cerca()">
                <div class="input-group-append">
                  <button class="btn btn-info rounded-pill" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;" type="button" (click)="cerca()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </li>
          <ng-container *ngIf="utenteLoggato"> 
            <li class="nav-item d-flex align-items-center">
              <a class="nav-link text-light d-flex align-items-center" [routerLink]="['/profilo']" routerLinkActive="active" title="Il mio Profilo" style="cursor: pointer;">
                <i class="bi bi-person-circle mr-1" style="font-size: 1.1rem; margin-right: 5px;"></i>
                <span>Benvenuto, <strong>{{ utenteLoggato.nome }}</strong>!</span>
              </a>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-danger btn-sm rounded-pill px-4 font-weight-bold" (click)="logout()">Logout</button>
            </li>
          </ng-container>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>
