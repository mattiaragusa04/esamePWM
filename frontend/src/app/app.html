

<div class="container mt-3">
  <nav class="navbar navbar-expand-lg bg-transparent py-1">
    <div class="container-fluid px-4">
      <!-- Logo -->
      <a class="navbar-brand font-weight-bold text-uppercase" routerLink="/">
        <span class="text-info">PA</span><span class="text-black">werUP</span>
      </a>
      
      <button class="navbar-toggler" type="button" (click)="toggleMenu()" [attr.aria-expanded]="!isMenuCollapsed" aria-controls="navbarNav" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Voci di menu principali -->
      <div class="collapse navbar-collapse" [class.show]="!isMenuCollapsed" id="navbarNav">
        <ul class="navbar-nav mr-auto align-items-center">
          
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'console']" routerLinkActive="active">
              Console
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'videogiochi']" routerLinkActive="active">
              Videogiochi
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'accessori']" routerLinkActive="active">
              Accessori
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [routerLink]="['/categoria', 'elettronica']" routerLinkActive="active">
              Elettronica
            </a>
          </li> 
        </ul>
        <ul class="navbar-nav ml-auto align-items-center">
          <li class="nav-item" #searchContainer>
              <div class="search-container-animated" [class.open]="mostraRicerca">
                <!-- Icona di ricerca visibile quando l'input è nascosto -->
                <a class="nav-link search-icon-btn" (click)="toggleRicerca($event)" style="cursor: pointer;" title="Cerca">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                  </svg>
              <span class="ml-1">Cerca</span>
                </a>
                <!-- Barra di ricerca che appare al click -->
                <div class="input-group input-group-sm search-input-wrapper">
                  <input #searchInput type="text" name="ricerca" class="form-control rounded-pill" style="border-top-right-radius: 0 !important; border-bottom-right-radius: 0 !important;" placeholder="Cerca prodotti..." [(ngModel)]="termineRicerca" (keyup.enter)="cerca()">
                  <div class="input-group-append">
                    <button class="btn btn-info rounded-pill" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;" type="button" (click)="cerca()">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
          </li>
          <li class="nav-item">
            <a class="nav-link d-flex align-items-center" [routerLink]="['/carrello']" routerLinkActive="active" title="Carrello">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-cart3" viewBox="0 0 16 16">
                <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l.84 4.479 9.144-.459L13.89 4zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/>
              </svg>
              <span class="ml-1">Carrello</span>
            </a>
          </li>
          <ng-container *ngIf="!utenteLoggato">
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center" [routerLink]="['/login']" routerLinkActive="active" title="Accedi">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
                <span class="ml-1">Accedi</span>
              </a>
            </li>

          </ng-container>
          <ng-container *ngIf="utenteLoggato"> 
            <li class="nav-item d-flex align-items-center">
              <a class="nav-link text-light d-flex align-items-center" [routerLink]="['/profilo']" routerLinkActive="active" title="Il mio Profilo" style="cursor: pointer;">
                <i class="bi bi-person-circle mr-1" style="font-size: 1.1rem; margin-right: 5px;"></i>
                <span>Benvenuto, <strong>{{ utenteLoggato.nome }}</strong>!</span>
              </a>
            </li>
            <li class="nav-item">
              <button class="btn btn-outline-danger btn-sm rounded-pill px-4 font-weight-bold" (click)="logout()">Logout</button>
            </li>
          </ng-container>
        </ul>
      </div>
    </div>
  </nav>
</div>

<div class="container mt-4">
  <router-outlet></router-outlet>
</div>


<!-- FOOTER -->
<footer class="footer mt-5 py-5">
  <div class="container">
    <div class="row align-items-center">
      <!-- Logo e Copyright -->
      <div class="col-md-4 text-center text-md-start mb-4 mb-md-0">
        <h4 class="text-uppercase font-weight-bold mb-2">
          <span class="text-info">PA</span><span class="text-white">werUP</span>
        </h4>
        <p class="small text-muted mb-0">© 2026 PAwerUP. Tutti i diritti riservati.</p>
      </div>

      <!-- Assistenza Clienti -->
      <div class="col-md-4 text-center mb-4 mb-md-0">
        <h6 class="text-uppercase font-weight-bold text-white mb-3">Supporto Tecnico</h6>
        <p class="text-info h5 mb-2">
          <i class="bi bi-telephone-fill me-2">+39 777 777 7777</i> 
        </p>
        <small class="text-muted d-block mb-3">Lunedì - Venerdì, 9:00 - 18:00</small>
        <a [routerLink]="['contattaci']" class="btn btn-outline-info btn-sm">
          Contattaci
        </a>
      </div>

      <!-- Social Media -->
      <div class="col-md-4 text-center text-md-end">
        <h6 class="text-uppercase font-weight-bold text-white mb-3">Seguici sui Social</h6>
        <div class="d-flex justify-content-center justify-content-md-end gap-3">
          <a href="#" class="social-icon instagram" title="Instagram">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="#" class="social-icon tiktok" title="TikTok">
            <i class="bi bi-tiktok"></i>
          </a>
          <a href="#" class="social-icon facebook" title="Facebook">
            <i class="bi bi-facebook"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</footer>
