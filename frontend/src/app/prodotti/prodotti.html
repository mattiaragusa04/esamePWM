<div class = "container mt-4">
  <h2 class="text-center mb-5 text-uppercase font-weight-bold text-white">Prodotti <span class="text-info">{{ categoriaDenominazione }}</span></h2>
  
  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border text-info" role="status">
      <span class="sr-only">Caricamento...</span>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger text-center">
    {{ errorMessage }}
  </div>

  <div *ngIf="prodotti.length === 0 && !isLoading && !errorMessage" class="text-center text-muted mt-5">
    Nessun prodotto trovato in questa categoria.
  </div>

  <div class="row">
    <div class="col-md-3 mb-4" *ngFor="let prodotto of prodotti">
      <div class="card h-100 shadow-lg product-card">
        <img [src]="prodotto.immagine.includes('http') ? prodotto.immagine : '/assets/' + prodotto.immagine" class="card-img-top p-3" [alt]="prodotto.nome" style="height: 200px; object-fit: contain;">
        <div class="card-body text-center d-flex flex-column justify-content-between">
          <h5 class="card-title font-weight-bold">{{ prodotto.nome }}</h5>
          <p class="text-info font-weight-bold mb-3">{{ prodotto.prezzoUnitarioVendita | currency:'EUR':'symbol' }}</p>
          <a class="btn btn-info rounded-pill px-4">Dettagli</a>
        </div>
      </div>
    </div>
  </div>
</div>
