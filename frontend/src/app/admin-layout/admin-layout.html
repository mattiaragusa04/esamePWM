<div class="container my-5">
  <div class="row gx-5">

    <!-- Sidebar Admin -->
    <div class="col-lg-3 mb-4">
      <div class="card shadow-sm border-0 rounded-4" style="background-color: #fffafb; border: 1px solid #ffccd5 !important;">
        <div class="card-body p-4 text-center border-bottom">
          <div class="bg-danger text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
            <i class="bi bi-shield-lock-fill fs-1"></i>
          </div>
          <h4 class="font-weight-bold mb-0">Portale Admin</h4>
          <p class="text-muted small">Gestione PAwerUP</p>
        </div>
        <div class="list-group list-group-flush rounded-bottom-4">
          <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-speedometer2 me-3 fs-5"></i>
            <span>Dashboard</span>
          </a>
          <a routerLink="/admin/prodotti" routerLinkActive="active"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-box-seam me-3 fs-5"></i>
            <span>Gestione Prodotti</span>
          </a>
          <a routerLink="/admin/utenti" routerLinkActive="active"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-people me-3 fs-5"></i>
            <span>Gestione Utenti</span>
          </a>
          <a routerLink="/admin/ordini" routerLinkActive="active"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-receipt me-3 fs-5"></i>
            <span>Gestione Ordini</span>
          </a>
          <a routerLink="/admin/acquisti" routerLinkActive="active"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-bag-check me-3 fs-5"></i>
            <span>Gestione Acquisti PAwerUP</span>
          </a>
          <a routerLink="/admin/coupon" routerLinkActive="active"
            class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0">
            <i class="bi bi-ticket-perforated-fill me-3 fs-5"></i>
            <span>Gestione Coupon</span>
          </a>
          <a routerLink="/" class="admin-sidebar-link list-group-item d-flex align-items-center p-3 border-0 mt-2 text-secondary">
            <i class="bi bi-arrow-left-circle me-3 fs-5"></i>
            <span>Torna al Sito</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Contenuto Principale -->
    <div class="col-lg-9">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
