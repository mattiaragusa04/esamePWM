<div class="admin-wrapper">
  <div class="row gx-0 gx-lg-4 align-items-start">

    <!-- ═══ SIDEBAR ADMIN ═══════════════════════════════════════════════════ -->
    <div class="col-lg-3 mb-4 mb-lg-0">
      <div class="admin-sidebar">

        <!-- Header sidebar -->
        <div class="admin-sidebar-header">
          <!-- Sfondo decorativo -->
          <div class="admin-sidebar-bg-deco"></div>

          <!-- Icona scudo -->
          <div class="admin-shield-wrap">
            <div class="admin-shield">
              <i class="bi bi-shield-lock-fill"></i>
            </div>
            <span class="admin-badge-pill">ADMIN</span>
          </div>

          <!-- Nome e ruolo -->
          <h5 class="admin-sidebar-name">{{ adminNome }}</h5>
          <p class="admin-sidebar-role">
            <i class="bi bi-circle-fill admin-online-dot"></i>
            Portale di Gestione
          </p>

        </div>

        <!-- Divider -->
        <div class="admin-sidebar-divider">
          <span>NAVIGAZIONE</span>
        </div>

        <!-- Voci di menu -->
        <nav class="admin-nav">
          <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
            class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-speedometer2"></i></span>
            <span class="admin-nav-label">Dashboard</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/prodotti" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-box-seam"></i></span>
            <span class="admin-nav-label">Prodotti</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/utenti" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-people"></i></span>
            <span class="admin-nav-label">Utenti</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/ordini" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-receipt"></i></span>
            <span class="admin-nav-label">Ordini</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/acquisti" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-bag-check"></i></span>
            <span class="admin-nav-label">Acquisti PAwerUP</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/coupon" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-ticket-perforated-fill"></i></span>
            <span class="admin-nav-label">Coupon periodici</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
          <a routerLink="/admin/shop-fedelta" routerLinkActive="active" class="admin-nav-link">
            <span class="admin-nav-icon"><i class="bi bi-stars"></i></span>
            <span class="admin-nav-label">Shop fedeltà</span>
            <i class="bi bi-chevron-right admin-nav-arrow"></i>
          </a>
        </nav>

      </div>
    </div>

    <!-- ═══ CONTENUTO PRINCIPALE ════════════════════════════════════════════ -->
    <div class="col-lg-9">
      <!-- Banner area protetta -->
      <div class="admin-area-banner mb-4">
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-shield-exclamation fs-5"></i>
          <div>
            <strong>Area riservata agli amministratori</strong>
            <span class="d-none d-md-inline text-muted ms-2">— Le modifiche qui hanno effetto immediato sul sito.</span>
          </div>
        </div>
        <span class="admin-area-badge">ACCESSO PRIVILEGIATO</span>
      </div>

      <router-outlet></router-outlet>
    </div>

  </div>
</div>
