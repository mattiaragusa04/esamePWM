<div class="container mt-4 mb-5">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <h3 class="font-weight-bold text-uppercase m-0">I miei <span class="text-info">Indirizzi</span></h3>
    <button class="btn btn-info rounded-pill px-4 font-weight-bold shadow-sm" (click)="toggleForm()" *ngIf="!mostraForm">
      + Nuovo Indirizzo
    </button>
  </div>

  <!-- Loader -->
  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-info" role="status"></div>
  </div>

  <!-- Elenco degli indirizzi salvati -->
  <div *ngIf="!isLoading && !mostraForm">
    <div *ngIf="indirizzi.length === 0" class="text-center my-5 text-muted p-5 bg-white shadow-sm" style="border-radius: 1.5rem;">
      <i class="bi bi-geo-alt fs-1 mb-3"></i>
      <h5>Nessun indirizzo salvato.</h5>
      <p>Aggiungi un indirizzo per velocizzare i tuoi futuri acquisti.</p>
    </div>

    <div class="row g-4" *ngIf="indirizzi.length > 0">
      <div class="col-md-6 col-lg-4 mb-4" *ngFor="let indirizzo of indirizzi">
        <div class="card h-100 shadow-sm border-0 position-relative" style="border-radius: 1rem;">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <span class="badge bg-info text-white rounded-pill px-3 py-2 text-uppercase">{{ indirizzo.tipo }}</span>
              <button class="btn btn-sm btn-outline-danger border-0 rounded-circle" (click)="eliminaIndirizzo(indirizzo.id)" title="Elimina indirizzo">
                <i class="bi bi-trash"></i>
              </button>
            </div>
            <h5 class="card-title font-weight-bold mb-1">{{ indirizzo.via }}, {{ indirizzo.numero_civico }}</h5>
            <p class="card-text text-muted mb-0">{{ indirizzo.cap }} - {{ indirizzo.provincia }}</p>
            <p class="card-text text-muted font-weight-bold">{{ indirizzo.paese }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Form per aggiungere un nuovo indirizzo -->
  <div *ngIf="mostraForm" class="card shadow-lg border-0 p-4 p-md-5 mx-auto" style="border-radius: 1.5rem; max-width: 800px;">
    <h4 class="mb-4 text-center font-weight-bold">Aggiungi nuovo indirizzo</h4>
    
    <form [formGroup]="indirizzoForm" (ngSubmit)="salvaIndirizzo()" class="row g-4">
      
      <div class="col-md-6">
        <label class="form-label text-muted font-weight-bold">Tipo di Indirizzo</label>
        <select class="form-select rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="tipo">
          <option value="Casa">Casa</option>
          <option value="Lavoro">Lavoro</option>
          <option value="Altro">Altro</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label text-muted font-weight-bold">Paese</label>
        <select class="form-select rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="paese">
          <option value="Italia">Italia</option>
        </select>
      </div>

      <div class="col-md-8 mt-3">
        <label class="form-label text-muted font-weight-bold">Via / Piazza</label>
        <input type="text" class="form-control rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="via" placeholder="Es. Via Roma">
      </div>

      <div class="col-md-4 mt-3">
        <label class="form-label text-muted font-weight-bold">N° Civico</label>
        <input type="text" class="form-control rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="numero_civico" placeholder="Es. 123">
      </div>

      <div class="col-md-6 mt-3">
        <label class="form-label text-muted font-weight-bold">Provincia / Città</label>
        <input type="text" class="form-control rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="provincia" placeholder="Es. Roma (RM)">
      </div>

      <div class="col-md-6 mt-3">
        <label class="form-label text-muted font-weight-bold">CAP</label>
        <input type="text" class="form-control rounded-pill px-4 py-2 border-0 bg-light w-100" formControlName="cap" placeholder="Es. 00100">
      </div>

      <div class="col-12 mt-5 d-flex gap-3 justify-content-end">
        <button type="button" class="btn btn-outline-secondary rounded-pill px-4" (click)="toggleForm()" [disabled]="isSaving">Annulla</button>
        <button type="submit" class="btn btn-info rounded-pill px-5 font-weight-bold shadow-sm" [disabled]="indirizzoForm.invalid || isSaving">
          <span *ngIf="!isSaving">Salva Indirizzo</span>
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm"></span>
        </button>
      </div>
    </form>
  </div>
</div>
