<div class="container my-5">
  <h1 class="text-center mb-4">Vendi a PAwerUP</h1>
  <p class="text-center text-secondary mb-5">Seleziona il prodotto che desideri vendere per ottenere una valutazione.</p>

  <div class="row mb-4">
    <div class="col-md-8 offset-md-2">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Cerca prodotti..." [(ngModel)]="searchTerm" (input)="applicaFiltri()">
        <button class="btn btn-info" type="button" (click)="applicaFiltri()">Cerca</button>
      </div>
    </div>
  </div>

  <!-- Filtri Categoria -->
  <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
    <button class="btn rounded-pill px-4" [ngClass]="categoriaSelezionata === 'Tutti' ? 'btn-info' : 'btn-outline-info'" (click)="impostaFiltro('Tutti')">Tutti</button>
    <button class="btn rounded-pill px-4" [ngClass]="categoriaSelezionata === 'Console' ? 'btn-info' : 'btn-outline-info'" (click)="impostaFiltro('Console')">Console</button>
    <button class="btn rounded-pill px-4" [ngClass]="categoriaSelezionata === 'Videogiochi' ? 'btn-info' : 'btn-outline-info'" (click)="impostaFiltro('Videogiochi')">Videogiochi</button>
    <button class="btn rounded-pill px-4" [ngClass]="categoriaSelezionata === 'Accessori' ? 'btn-info' : 'btn-outline-info'" (click)="impostaFiltro('Accessori')">Accessori</button>
    <button class="btn rounded-pill px-4" [ngClass]="categoriaSelezionata === 'Elettronica' ? 'btn-info' : 'btn-outline-info'" (click)="impostaFiltro('Elettronica')">Elettronica</button>
  </div>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-info" role="status">
      <span class="visually-hidden">Caricamento...</span>
    </div>
    <p class="mt-2">Caricamento prodotti...</p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger text-center my-5">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage && prodottiFiltrati.length === 0" class="alert alert-warning text-center my-5">
    Nessun prodotto trovato.
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" *ngIf="!isLoading && prodottiFiltrati.length > 0">
    <div class="col" *ngFor="let prodotto of getProdottiPaginati()">
      <div class="card h-100 product-card">
        <img [src]="prodotto.immagine" class="card-img-top" alt="{{ prodotto.nome }}" (error)="handleImageError($event)">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ prodotto.nome }}</h5>
          <p class="card-text text-secondary flex-grow-1">{{ prodotto.descrizione | slice:0:100 }}...</p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <span class="fw-bold text-info fs-5">€{{ prodotto.prezzoUnitarioVendita | number:'1.2-2' }}</span>
            <button class="btn btn-info" (click)="selezionaProdottoPerVendita(prodotto.id)">
              Vendi questo prodotto
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Paginazione -->
  <nav *ngIf="!isLoading && prodottiFiltrati.length > elementiPerPagina" class="mt-5 mb-4 d-flex justify-content-center">
    <ul class="pagination border-0 mb-0 align-items-center">
      <li class="page-item border-0" [class.disabled]="paginaCorrente === 1">
        <button class="page-link border-0 bg-transparent text-info shadow-none d-flex align-items-center" (click)="cambiaPagina(paginaCorrente - 1)">
          <i class="bi bi-arrow-left-circle fs-4"></i>
        </button>
      </li>

      <li class="page-item border-0" *ngFor="let p of getPagineVisibili()" [class.active]="paginaCorrente === p">
        <button class="page-link shadow-sm rounded-circle mx-1 d-flex justify-content-center align-items-center pagination-dot" (click)="cambiaPagina(p)">{{ p }}</button>
      </li>

      <li class="page-item border-0" [class.disabled]="paginaCorrente === getNumeroPagine()">
        <button class="page-link border-0 bg-transparent text-info shadow-none d-flex align-items-center" (click)="cambiaPagina(paginaCorrente + 1)">
          <i class="bi bi-arrow-right-circle fs-4"></i>
        </button>
      </li>
    </ul>
  </nav>
</div>
