<div class="profilo-sidebar" [class.collapsed]="isMenuCollapsed" [class.no-transition]="!isAnimationEnabled">
  
  <div class="profilo-sidebar-header">
    <div class="profilo-sidebar-bg-deco"></div>

    <button class="profilo-toggle-btn" (click)="toggleMenu()" title="Espandi/Comprimi">
      <i class="bi" [ngClass]="isMenuCollapsed ? 'bi-layout-sidebar' : 'bi-layout-sidebar-reverse'"></i>
    </button>

    <div class="profilo-avatar-wrap">
      <div class="profilo-avatar">
        <span class="nav-text">{{ iniziali }}</span>
      </div>
    </div>

    <div class="nav-text profilo-header-info">
      <h5 class="profilo-sidebar-name">{{ utente?.nome }} {{ utente?.cognome }}</h5>
      <p class="profilo-sidebar-email">{{ utente?.email }}</p>
    </div>

    <div class="profilo-points-card nav-text">
      <div class="profilo-points-top">
        <span class="profilo-points-icon"><i class="bi bi-star-fill"></i></span>
        <span class="profilo-points-value">{{ utente?.puntiFedelta || 0 }}</span>
        <span class="profilo-points-label">Punti Fedeltà</span>
      </div>

      <div class="profilo-level-bar-wrap">
        <div class="profilo-level-bar">
          <div class="profilo-level-fill" [style.width.%]="progressoPunti"></div>
        </div>
        <div class="profilo-level-labels">
          <span>{{ livelloCorrente }}</span>
          <span>{{ livelloSuccessivo }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="profilo-sidebar-divider">
    <span class="nav-text">MENU</span>
  </div>

  <nav class="profilo-nav">
    <a routerLink="/profilo" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="profilo-nav-link" title="Dati Personali">
      <span class="profilo-nav-icon"><i class="bi bi-house"></i></span>
      <span class="profilo-nav-label nav-text">Dati Personali</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/ordini" routerLinkActive="active" class="profilo-nav-link" title="I miei Ordini">
      <span class="profilo-nav-icon"><i class="bi bi-bag"></i></span>
      <span class="profilo-nav-label nav-text">I miei Ordini</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/vendite" routerLinkActive="active" class="profilo-nav-link" title="Le mie Vendite">
      <span class="profilo-nav-icon"><i class="bi bi-cash-coin"></i></span>
      <span class="profilo-nav-label nav-text">Le mie Vendite</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/carte-di-credito" routerLinkActive="active" class="profilo-nav-link" title="Metodi di Pagamento">
      <span class="profilo-nav-icon"><i class="bi bi-credit-card"></i></span>
      <span class="profilo-nav-label nav-text">Metodi di Pagamento</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/indirizzi" routerLinkActive="active" class="profilo-nav-link" title="Indirizzi Salvati">
      <span class="profilo-nav-icon"><i class="bi bi-pin-map"></i></span>
      <span class="profilo-nav-label nav-text">Indirizzi Salvati</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/fedelta" routerLinkActive="active" class="profilo-nav-link" title="Spendi i tuoi punti fedeltà">
      <span class="profilo-nav-icon"><i class="bi bi-trophy-fill"></i></span>
      <span class="profilo-nav-label nav-text">Spendi i tuoi punti fedeltà</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
    <a routerLink="/profilo/impostazioni" routerLinkActive="active" class="profilo-nav-link" title="Impostazioni">
      <span class="profilo-nav-icon"><i class="bi bi-gear"></i></span>
      <span class="profilo-nav-label nav-text">Impostazioni</span>
      <i class="bi bi-chevron-right profilo-nav-arrow"></i>
    </a>
  </nav>

  <div class="profilo-sidebar-footer">
    <button class="profilo-logout-btn" (click)="logout()" title="Logout">
      <i class="bi bi-box-arrow-right"></i>
      <span class="nav-text">Logout</span>
    </button>
  </div>

</div>
