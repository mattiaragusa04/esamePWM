<style>
  .sidebar-container {
    width: 280px;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-x: hidden;
  }
  
  .sidebar-container.no-transition {
    transition: none !important;
  }
  
  .sidebar-container.collapsed {
    width: 80px; /* Larghezza ridotta quando chiusa */
  }

  /* Nasconde il testo, il nome dell'app e la freccina del dropdown */
  .sidebar-container.collapsed .nav-text,
  .sidebar-container.collapsed .brand-text,
  .sidebar-container.collapsed .dropdown-toggle::after {
    display: none !important;
  }

  /* Centra le icone quando il menu è chiuso */
  .sidebar-container.collapsed .nav-link,
  .sidebar-container.collapsed .dropdown-toggle {
    justify-content: center !important;
    padding-left: 0;
    padding-right: 0;
  }
  
  /* Rimuove il margine dalle icone per farle stare al centro */
  .sidebar-container.collapsed .bi {
    margin-right: 0 !important;
  }
</style>

<div class="d-flex flex-column flex-shrink-0 p-3 text-bg-white shadow-lg sidebar-container" [class.collapsed]="isMenuCollapsed" [class.no-transition]="!isAnimationEnabled" style="border-radius: 1.5rem; z-index: 1; min-height: 100vh;">
    <div class="d-flex align-items-center justify-content-between mb-3 mb-md-0 w-100">
      <a href="/" class="d-flex align-items-center text-dark text-decoration-none brand-text">
        <i class="bi bi-person-circle fs-2 pe-none me-2 bi"></i>
        <span class="fs-4 text-nowrap">Il mio Profilo</span>
      </a>
      <!-- Bottone per il toggle dell'animazione -->
      <button class="btn btn-sm btn-outline-secondary border-0" (click)="toggleMenu()">
        <i class="bi bi-list fs-3"></i>
      </button>
    </div>
    <hr />
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a routerLink="/profilo" class="nav-link text-dark d-flex align-items-center" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" title="Dati Personali">
          <i class="bi bi-house pe-none me-2 bi"></i>
          <span class="nav-text text-nowrap">Dati Personali</span>
        </a>
      </li>
      <li>
        <a routerLink="/profilo/ordini" class="nav-link text-dark d-flex align-items-center" routerLinkActive="active" title="I miei Ordini">
          <i class="bi bi-table pe-none me-2 bi"></i>
          <span class="nav-text text-nowrap">I miei Ordini</span>
        </a>
      </li>
      <li>
        <a routerLink="/profilo/desideri" class="nav-link text-dark d-flex align-items-center" routerLinkActive="active" title="Lista Desideri">
          <i class="bi bi-grid pe-none me-2 bi"></i>
          <span class="nav-text text-nowrap">Lista Desideri</span>
        </a>
      </li>
      <li>
        <a routerLink="/profilo/impostazioni" class="nav-link text-dark d-flex align-items-center" routerLinkActive="active" title="Impostazioni">
          <i class="bi bi-speedometer2 pe-none me-2 bi"></i>
          <span class="nav-text text-nowrap">Impostazioni</span>
        </a>
      </li>
    </ul>
    <hr />
    <div class="dropdown">
      <a href="javascript:void(0)" class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle" data-toggle="dropdown" aria-expanded="false" title="Menu Utente">
       <i class="bi bi-person-circle mr-1 bi" style="font-size: 1.1rem; margin-right: 5px;"></i>
        <strong class="nav-text text-nowrap">{{ utente?.nome || 'Utente' }}</strong>
      </a>
      <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
        <li><a class="dropdown-item" routerLink="/profilo/impostazioni">Impostazioni</a></li>
        <li><a class="dropdown-item" routerLink="/profilo">Profilo</a></li>
        <li><hr class="dropdown-divider" /></li>
        <li><a class="dropdown-item" href="javascript:void(0)" (click)="logout()">Esci</a></li>
      </ul>
    </div>
</div>
