<main class="d-flex flex-nowrap" style="min-height: 100vh;">
  <app-sidebar></app-sidebar>

  <!-- Area del contenuto principale (Aggiunta per gestire i contenuti del profilo) -->
  <div class="d-flex flex-column flex-grow-1 p-4 bg-light overflow-auto">
    <h2>Benvenuto nel tuo profilo, <span class="text-info">{{ utente?.nome }}</span>!</h2>
    <p class="lead">Seleziona una voce dal menu a sinistra per gestire i tuoi dati o i tuoi ordini.</p>
    
    <div class="card mt-4 shadow-sm" *ngIf="utente">
      <div class="card-body">
        <h4 class="card-title mb-4">I tuoi dati personali</h4>
        <div class="row mb-3 border-bottom pb-2">
          <div class="col-md-3 fw-bold text-muted">Nome:</div>
          <div class="col-md-9">{{ utente.nome }}</div>
        </div>
        <div class="row mb-3 border-bottom pb-2">
          <div class="col-md-3 fw-bold text-muted">Cognome:</div>
          <div class="col-md-9">{{ utente.cognome }}</div>
        </div>
        <div class="row mb-3 border-bottom pb-2">
          <div class="col-md-3 fw-bold text-muted">Email:</div>
          <div class="col-md-9">{{ utente.email }}</div>
        </div>
        <div class="row mb-3">
          <div class="col-md-3 fw-bold text-muted">Punti Fedeltà:</div>
          <div class="col-md-9"><span class="badge bg-warning text-dark fs-6">{{ utente.puntiFedelta || 0 }}</span></div>
        </div>
      </div>
    </div>
  </div>
</main>
